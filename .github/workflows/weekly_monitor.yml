name: Weekly Bandi PA Monitor

on:
  schedule:
    # Esegue ogni lunedì alle 07:00 UTC (09:00 ora italiana in estate, 08:00 in inverno)
    - cron: '0 7 * * 1'
  workflow_dispatch:
    # Consente l'avvio manuale del monitoraggio dal pannello di controllo GitHub

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Permette alle Actions di effettuare il push di modifiche sul repository

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # Abilita la cache per accelerare le esecuzioni successive

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install duckduckgo-search

    - name: Run Cloud Monitor & Send Email
      env:
        SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
        SMTP_PORT: ${{ secrets.SMTP_PORT }}
        SMTP_USER: ${{ secrets.SMTP_USER }}
        SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      run: |
        python .agents/scripts/cloud_monitor.py

    - name: Commit and push tracking updates
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add bandi-tracking.md reports/
        git commit -m "Aggiornamento automatico: Bandi PA [skip ci]" || echo "Nessuna modifica rilevata."
        git push
